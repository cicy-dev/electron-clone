<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clone Studio</title>
<style>
:root { --bg:#0d1117; --s1:#161b22; --s2:#21262d; --bd:#30363d; --t1:#e6edf3; --t2:#7d8590; --blue:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#d29922; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--t1);height:100vh;display:flex;flex-direction:column;font-size:13px}

.bar{display:flex;gap:8px;padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--bd);align-items:center}
.bar input{padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:13px;outline:none}
.bar input:focus{border-color:var(--blue)}
.bar .url-input{flex:2;min-width:200px}
.bar .clone-input{flex:1;min-width:120px}
.lbl{font-size:11px;color:var(--t2);white-space:nowrap}

.btn{padding:6px 16px;border-radius:6px;border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:600;background:var(--s2);color:var(--t1);transition:.15s}
.btn:hover{background:var(--s1);border-color:var(--blue)}
.btn-go{background:#238636;border-color:#238636;color:#fff;min-width:80px}
.btn-go:hover{background:#2ea043}
.btn-go.loading{opacity:.7;pointer-events:none}

/* 同步模式按钮 */
.sync-mode{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px;border:1px solid var(--bd)}
.sync-mode .sm{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--t2);border:none;background:transparent}
.sync-mode .sm.on{background:var(--blue);color:#fff}
.sync-mode .sm:hover:not(.on){color:var(--t1)}

.info{display:flex;gap:12px;padding:3px 12px;background:var(--s2);border-bottom:1px solid var(--bd);font-size:11px;color:var(--t2);align-items:center;min-height:24px;overflow:hidden}
.tag{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.tag-g{background:rgba(63,185,80,.15);color:var(--green)}
.tag-r{background:rgba(248,81,73,.15);color:var(--red)}
.tag-o{background:rgba(210,153,34,.15);color:var(--orange)}
.tag-b{background:rgba(88,166,255,.15);color:var(--blue)}
.spin{display:inline-block;width:10px;height:10px;border:2px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.main{flex:1;display:flex;overflow:hidden}
.views{flex:1;display:flex;gap:1px;background:var(--bd)}
.view{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.vh{padding:3px 10px;background:var(--s1);font-size:11px;color:var(--t2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd)}
.vh .t{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
.t-a{background:var(--blue);color:#fff}
.t-b{background:var(--green);color:#fff}
.view webview{flex:1;border:none}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--t2)}

.panel{width:300px;background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column}
.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:6px;text-align:center;font-size:11px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tc{flex:1;overflow-y:auto;padding:6px;font-size:11px}
.tc::-webkit-scrollbar{width:3px}
.tc::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.li{padding:4px 6px;border-radius:4px;word-break:break-all;margin-bottom:2px;background:var(--bg);border:1px solid var(--bd)}
.li.r{border-color:rgba(248,81,73,.3)}
.li.o{border-color:rgba(210,153,34,.3)}
.li.g{border-color:rgba(63,185,80,.3)}

.cfg-row{margin-bottom:8px}
.cfg-row .lbl{display:block;margin-bottom:3px}
.wl-row{display:flex;gap:4px;margin-bottom:6px}
.wl-row input{flex:1;padding:3px 6px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:12px;outline:none}
.wl-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;background:var(--s2);border-radius:3px;font-size:11px;margin:1px}
.wl-tag .x{cursor:pointer;color:var(--red)}
</style>
</head>
<body>

<div class="bar">
  <span class="lbl">源站</span>
  <input class="url-input" id="src" placeholder="https://example.com/page" />
  <span class="lbl">克隆</span>
  <input class="clone-input" id="dst" value="http://localhost:8787" />
  <button class="btn btn-go" id="go-btn" onclick="doSync()">⟳ 同步</button>
  <div class="sync-mode">
    <div class="sm" onclick="setSyncMode('off',this)" id="sm-off">关</div>
    <div class="sm on" onclick="setSyncMode('a',this)" id="sm-a">A→B</div>
    <div class="sm" onclick="setSyncMode('b',this)" id="sm-b">B→A</div>
  </div>
  <button class="btn" onclick="reloadViews()">↻</button>
  <button class="btn" onclick="doReset()">重置</button>
</div>

<div class="info" id="info">就绪</div>

<div class="main">
  <div class="views">
    <div class="view" id="v-a">
      <div class="vh"><span id="la">Source</span><span class="t t-a">A</span></div>
      <div class="empty">输入源站 URL → 同步</div>
    </div>
    <div class="view" id="v-b">
      <div class="vh"><span id="lb">Clone</span><span class="t t-b">B</span></div>
      <div class="empty">同步后自动加载</div>
    </div>
  </div>
  <div class="panel">
    <div class="tabs">
      <div class="tab on" onclick="stab(this,0)">日志</div>
      <div class="tab" onclick="stab(this,1)">404 <span id="n404"></span></div>
      <div class="tab" onclick="stab(this,2)">异常 <span id="nerr"></span></div>
      <div class="tab" onclick="stab(this,3)">配置</div>
    </div>
    <div class="tc" id="p0"></div>
    <div class="tc" id="p1" style="display:none"></div>
    <div class="tc" id="p2" style="display:none"></div>
    <div class="tc" id="p3" style="display:none"></div>
  </div>
</div>

<script>
const API='http://localhost:8835';
const $=id=>document.getElementById(id);

// ========== 同步操作 ==========
let syncMode = 'a'; // 'off' | 'a' (A→B) | 'b' (B→A)

function setSyncMode(mode, el) {
  syncMode = mode;
  document.querySelectorAll('.sm').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
  // 重新绑定事件
  bindSyncEvents();
}

function getWebviews() {
  return {
    a: $('v-a').querySelector('webview'),
    b: $('v-b').querySelector('webview')
  };
}

function bindSyncEvents() {
  const { a, b } = getWebviews();
  if (!a || !b) return;

  // 清除旧监听
  [a, b].forEach(wv => {
    wv.removeEventListener('ipc-message', wv._syncHandler);
  });

  if (syncMode === 'off') return;

  const source = syncMode === 'a' ? a : b;
  const target = syncMode === 'a' ? b : a;

  // 在 source webview 注入事件监听
  source.addEventListener('dom-ready', () => injectSyncCapture(source), { once: false });
  if (!source.isLoading()) injectSyncCapture(source);

  // 监听 source 的 console-message，捕获同步事件
  source.addEventListener('console-message', (e) => {
    if (e.message.startsWith('__SYNC__')) {
      try {
        const data = JSON.parse(e.message.slice(8));
        forwardEvent(target, data);
      } catch {}
    }
  });
}

function injectSyncCapture(wv) {
  wv.executeJavaScript(`
    (function() {
      if (window.__syncInjected) return;
      window.__syncInjected = true;

      // 点击
      document.addEventListener('click', e => {
        window.__syncSend({ type:'click', x:e.clientX, y:e.clientY, button:e.button });
      }, true);

      // 双击
      document.addEventListener('dblclick', e => {
        window.__syncSend({ type:'dblclick', x:e.clientX, y:e.clientY });
      }, true);

      // 右键
      document.addEventListener('contextmenu', e => {
        window.__syncSend({ type:'contextmenu', x:e.clientX, y:e.clientY });
      }, true);

      // 滚动
      let scrollTimer;
      document.addEventListener('scroll', e => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          window.__syncSend({ type:'scroll', x:window.scrollX, y:window.scrollY });
        }, 50);
      }, true);

      // 鼠标移动（节流）
      let moveTimer;
      document.addEventListener('mousemove', e => {
        clearTimeout(moveTimer);
        moveTimer = setTimeout(() => {
          window.__syncSend({ type:'mousemove', x:e.clientX, y:e.clientY });
        }, 30);
      }, true);

      window.__syncSend = function(data) {
        // 通过 console.log 传递（webview 没有 preload 时的替代方案）
        console.log('__SYNC__' + JSON.stringify(data));
      };
    })();
  `).catch(() => {});
}

function forwardEvent(targetWv, data) {
  if (!targetWv) return;
  switch (data.type) {
    case 'click':
      targetWv.sendInputEvent({ type: 'mouseDown', x: data.x, y: data.y, button: 'left', clickCount: 1 });
      targetWv.sendInputEvent({ type: 'mouseUp', x: data.x, y: data.y, button: 'left', clickCount: 1 });
      break;
    case 'dblclick':
      targetWv.sendInputEvent({ type: 'mouseDown', x: data.x, y: data.y, button: 'left', clickCount: 2 });
      targetWv.sendInputEvent({ type: 'mouseUp', x: data.x, y: data.y, button: 'left', clickCount: 2 });
      break;
    case 'contextmenu':
      targetWv.sendInputEvent({ type: 'mouseDown', x: data.x, y: data.y, button: 'right', clickCount: 1 });
      targetWv.sendInputEvent({ type: 'mouseUp', x: data.x, y: data.y, button: 'right', clickCount: 1 });
      break;
    case 'scroll':
      targetWv.executeJavaScript(`window.scrollTo(${data.x}, ${data.y})`).catch(() => {});
      break;
    case 'mousemove':
      targetWv.sendInputEvent({ type: 'mouseMove', x: data.x, y: data.y });
      break;
  }
}

// ========== UI ==========
function stab(el,i){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  for(let j=0;j<4;j++) $('p'+j).style.display=j===i?'':'none';
}

async function api(p,o={}){
  const r=await fetch(API+p,{headers:{'Content-Type':'application/json'},...o});
  return r.json();
}

function wv(url, container) {
  const old = container.querySelector('webview,.empty');
  if (old) old.remove();
  const w = document.createElement('webview');
  w.src = url;
  w.style.cssText = 'flex:1';
  w.setAttribute('allowpopups', '');
  w.setAttribute('nodeintegration', '');

  // 监听 console-message 来捕获同步事件
  w.addEventListener('console-message', (e) => {
    if (e.message.startsWith('__SYNC__')) {
      try {
        const data = JSON.parse(e.message.slice(8));
        const { a, b } = getWebviews();
        // 判断事件来源
        const isFromA = (w === a);
        const isFromB = (w === b);
        if (syncMode === 'a' && isFromA) forwardEvent(b, data);
        if (syncMode === 'b' && isFromB) forwardEvent(a, data);
      } catch {}
    }
  });

  // dom-ready 后注入同步捕获
  w.addEventListener('dom-ready', () => {
    const { a, b } = getWebviews();
    if ((syncMode === 'a' && w === a) || (syncMode === 'b' && w === b)) {
      injectSyncCapture(w);
    }
  });

  container.appendChild(w);
  return w;
}

function setInfo(html){$('info').innerHTML=html}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function doSync(){
  const src=$('src').value.trim();
  if(!src)return alert('请输入源站 URL');
  const btn=$('go-btn');
  btn.classList.add('loading');btn.innerHTML='<span class="spin"></span> 同步中...';
  setInfo('<span class="spin"></span> 正在同步...');

  try{
    const res=await api('/api/sync',{method:'POST',body:JSON.stringify({url:src})});
    if(res.ok){
      setInfo(`<span class="tag tag-g">✓ 修复 ${res.resolved.length}</span> <span class="tag tag-r">404: ${res.notFound.length}</span> <span class="tag tag-o">异常: ${res.errors.length}</span> <span class="tag tag-b">索引: ${res.stats?.indexed||0}</span>`);
      // 加载双窗口
      wv(src, $('v-a')); $('la').textContent = src;
      try {
        const srcUrl = new URL(src);
        const cloneBase = $('dst').value.trim().replace(/\/$/, '');
        const cloneUrl = cloneBase + srcUrl.pathname + srcUrl.search;
        wv(cloneUrl, $('v-b')); $('lb').textContent = cloneUrl;
      } catch {
        wv($('dst').value.trim(), $('v-b')); $('lb').textContent = $('dst').value.trim();
      }
      localStorage.setItem('cs-src', src);
      localStorage.setItem('cs-dst', $('dst').value.trim());
      
      // 绑定同步事件
      setTimeout(() => bindSyncEvents(), 1000);
    } else {
      setInfo(`<span class="tag tag-r">失败: ${esc(res.error)}</span>`);
    }
    refreshPanel();
  } catch(e) {
    setInfo(`<span class="tag tag-r">错误: ${esc(e.message)}</span>`);
  } finally {
    btn.classList.remove('loading'); btn.textContent = '⟳ 同步';
  }
}

function reloadViews(){document.querySelectorAll('webview').forEach(w=>w.reload())}

async function doReset(){
  if(!confirm('确定重置？'))return;
  await api('/api/reset',{method:'POST'});
  setInfo('已重置');refreshPanel();
}

async function refreshPanel(){
  const res=await api('/api/status');
  if(!res.ok)return;
  const s=res.state;
  $('p0').innerHTML=s.log.length?s.log.map(l=>`<div class="li">${esc(l)}</div>`).join(''):'<div style="color:var(--t2);padding:20px;text-align:center">无日志</div>';
  $('p0').scrollTop=$('p0').scrollHeight;
  $('n404').textContent=s.notFound.length||'';
  $('p1').innerHTML=s.notFound.length?s.notFound.map(u=>`<div class="li r">${esc(u)}</div>`).join(''):'<div style="color:var(--t2);padding:20px;text-align:center">无</div>';
  $('nerr').textContent=s.errors.length||'';
  $('p2').innerHTML=s.errors.length?s.errors.map(e=>`<div class="li o">${esc(e.url)}<br><small>${esc(e.error)}</small></div>`).join(''):'<div style="color:var(--t2);padding:20px;text-align:center">无</div>';
  const cfg=await api('/api/config');
  if(cfg.ok)renderConfig(cfg.config);
}

function renderConfig(c){
  $('p3').innerHTML=`
    <div class="cfg-row"><span class="lbl">白名单域名</span>
      <div class="wl-row"><input id="wl-in" placeholder="example.com" onkeydown="if(event.key==='Enter')addWL()"/><button class="btn" onclick="addWL()">+</button></div>
      <div id="wl-tags">${(c.whitelist_domains||[]).map(d=>`<span class="wl-tag">${esc(d)} <span class="x" onclick="rmWL('${esc(d)}')">×</span></span>`).join('')}</div>
    </div>
    <div class="cfg-row"><span class="lbl">并发数</span>
      <input id="cfg-c" type="number" value="${c.concurrency}" style="width:50px;padding:3px 6px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--t1)"/>
      <button class="btn" onclick="saveCfg()" style="margin-left:4px">保存</button>
    </div>`;
}

async function addWL(){
  const v=$('wl-in').value.trim();if(!v)return;
  const r=await api('/api/config');
  const wl=r.config.whitelist_domains;
  if(!wl.includes(v))wl.push(v);
  await api('/api/config',{method:'POST',body:JSON.stringify({whitelist_domains:wl})});
  refreshPanel();
}
async function rmWL(d){
  const r=await api('/api/config');
  await api('/api/config',{method:'POST',body:JSON.stringify({whitelist_domains:r.config.whitelist_domains.filter(x=>x!==d)})});
  refreshPanel();
}
async function saveCfg(){
  await api('/api/config',{method:'POST',body:JSON.stringify({concurrency:parseInt($('cfg-c').value)||20})});
  refreshPanel();
}

// 初始化
const p=new URLSearchParams(location.search);
const urlP=p.get('url');
$('src').value=urlP||localStorage.getItem('cs-src')||'';
$('dst').value=localStorage.getItem('cs-dst')||'http://localhost:8787';
if(urlP)setTimeout(doSync,300);
else refreshPanel();
</script>
</body>
</html>
