        left: 0;

    <script>
      //是否移动端
      var isMobile = function () {
        return /Android|webOS|iPhone|iPad|iPod|ios|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      }
      //是否使用移动端
      var isUseMobile = window.screen.width <= 750 && isMobile()
      //如果使用移动端，则改变 ViewPort
      if (isUseMobile) {
        var viewPortContent = 'width=750,user-scalable=no,viewport-fit=cover'
        //火狐低端浏览器单独处理
        const isFirefox = navigator.userAgent.includes('Firefox')
        if (isFirefox && isMobile()) {
          var phoneScale = window.screen.width / 750
          viewPortContent += ',maximum-scale=' + phoneScale + ',minimum-scale=' + phoneScale
        }
        document.head.querySelector(`meta[name='viewport']`).setAttribute('content', viewPortContent)
      }

      //获取Url参数
      var queryParams = new URLSearchParams(window.location.search)
      //获取来源地址
      var from = queryParams.get('from')
      if (from) {
        from = decodeURIComponent(from)
        var search = new URL(from).search
        history.replaceState({}, '', '/' + search || '/')
      }
      //获取当前地址,url 来源参数，或者去掉最后的html链接
      var link = location.href
      //window.history.replaceState(window.history.state, '', setUrlQuery(null, { cid }))
      //支持的语言 巴西-pt 中国-中文 越南-越南语  印度-印地语  英语
      var supportLocales = ['zh', 'pt', 'vi', 'hi', 'en']
      var copySuccessTip = '复制成功' //复制成功的文案
      var localesTransMap = {
        zh: {
          t_0: '升级浏览器通知',
          t_1: '您当前浏览器版本过低，',
          t_2: '为了更好的体验游戏，请使用',
          t_3: '系统浏览器打开',
          t_4: '当前链接:',
          t_5: '若仍然无法打开，可下载Chrome浏览器',
          t_6: '下载Chrome',
          cst: '复制成功'
        },
        pt: {
          t_0: 'Atualização do navegador',
          t_1: 'A versão do seu navegador está desatualizada,',
          t_2: 'Para uma melhor experiência de jogo, use',
          t_3: 'o navegador do sistema',
          t_4: 'Link atual:',
          t_5: 'Se ainda não conseguir abrir, você pode baixar o navegador Chrome',
          t_6: 'Baixar Chrome',
          cst: 'Copiado com sucesso'
        },
        vi: {
          t_0: 'Cập nhật trình duyệt',
          t_1: 'Phiên bản trình duyệt của bạn quá thấp,',
          t_2: 'Để có trải nghiệm chơi game tốt hơn, hãy sử dụng',
          t_3: 'trình duyệt hệ thống',
          t_4: 'Liên kết hiện tại:',
          t_5: 'Nếu vẫn không thể mở, bạn có thể tải xuống trình duyệt Chrome',
          t_6: 'Tải xuống Chrome',
          cst: 'Sao chép thành công'
        },
        hi: {
          t_0: 'ब्राउज़र अपडेट करें',
          t_1: 'आपका वर्तमान ब्राउज़र संस्करण बहुत पुराना है,',
          t_2: 'बेहतर गेमिंग अनुभव के लिए, कृपया उपयोग करें',
          t_3: 'सिस्टम ब्राउज़र',
          t_4: 'वर्तमान लिंक:',
          t_5: 'यदि फिर भी नहीं खुलता है, तो आप Chrome ब्राउज़र डाउनलोड कर सकते हैं',
          t_6: 'Chrome डाउनलोड करें',
          cst: 'सफलतापूर्वक कॉपी किया गया'
        },
        en: {
          t_0: 'Upgrade Browser Notification',
          t_1: 'Your current browser version is outdated,',
          t_2: 'For a better gaming experience, please use',
          t_3: 'the system browser',
          t_4: 'Current link:',
          t_5: "If you still can't open it, you can download Chrome browser",
          t_6: 'Download Chrome',
          cst: 'Copy successful'
        }
      }

      //基于浏览器语言获取默认语言
      function getLocaleByBrowser() {
        //获取URL参数的语言
        var locale = new URLSearchParams(window.location.search).get('languageCode')
        //对语言转换成小写
        let lang = (locale || window.navigator.language).toLocaleLowerCase()
        //获取语言
        lang = lang.split('-')[0]

        //如果语言包含则使用，不包含则使用默认语言
        var useLocale = supportLocales.includes(lang) ? lang : 'en'
        //定义语言对应的lang值，如果没有定义，则使用枚举值
        var langMap = { zh: 'zh-CN' }
        document.documentElement.setAttribute('lang', langMap[locale] || locale)
        return useLocale
      }

      //页面加载完成，执行方法
      window.onload = function () {
        //如果宽度大于 500px ，则使用PC模式
        if (!isUseMobile) {
          document.body.classList.add('mode-pc')
        }
        //设置当前链接
        document.getElementById('current-link').innerText = link
        //设置语言
        var locale = getLocaleByBrowser()
        var transMap = localesTransMap[locale]
        copySuccessTip = transMap.cst
        for (var id in transMap) {
          var idEl = document.getElementById(id)
          if (idEl) {
            idEl.innerText = transMap[id]
          }
        }
      }

      //复制链接
      function clipboard(text) {
        var textField = document.createElement('input')
        textField.setAttribute('value', text)
        document.body.appendChild(textField)
        textField.select()
        document.execCommand('copy')
        textField.remove()
      }
      //点击复制按钮
      function copyCurrentLink() {
        clipboard(link)
        alert(copySuccessTip)
      }
      //系统浏览器打开
      function openBySystemBrowser() {
        var protocol = window.location.protocol
        var openUrl = 'intent://' + link.replace(protocol + '//', '') + '#Intent;scheme=' + protocol.replace(':', '') + ';end'
        window.location.href = openUrl
      }
    </script>
